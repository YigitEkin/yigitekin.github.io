name: Deploy static content to Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inspect artifact path
        run: |
          ls -la .
          echo "Looking for index.html at repo root:"
          test -f ./index.html && echo "FOUND at root" || echo "NOT at root"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./          # change to ./dist or ./_site if that’s where index.html is

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
